services:
  web:
    build:
      context: ./mfp_backend
    container_name: mfp_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
    volumes:
      - ./mfp_backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15
    container_name: mfp_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: mfp_redis
    volumes:
      - redis_data:/data
    restart: always

  celery:
    build:
      context: ./mfp_backend
    container_name: mfp_celery
    command: celery -A config worker -l info
    volumes:
      - ./mfp_backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build:
      context: ./mfp_backend
    container_name: mfp_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ./mfp_backend:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always

  flower:
    build:
      context: ./mfp_backend
    container_name: mfp_flower
    command: celery -A config flower --port=5555 --address=0.0.0.0
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery
    restart: always

  nginx:
    image: nginx:latest
    container_name: mfp_nginx
    ports:
      - "80:80"
    volumes:
      - ./mfp_backend/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./mfp_backend:/app
    depends_on:
      - web
    restart: always


volumes:
  postgres_data:
  redis_data:
