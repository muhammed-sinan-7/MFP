events {}

http {
    include /etc/nginx/mime.types;
    client_max_body_size 100M;

    upstream django {
        server web:8000;
    }

    # -----------------------------
    # HTTP (port 80)
    # -----------------------------
    server {
        listen 80;
        server_name unisocial.online www.unisocial.online api.unisocial.online;

        # Required for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------
    # HTTPS (port 443)
    # -----------------------------
    server {
        listen 443 ssl;
        server_name unisocial.online www.unisocial.online api.unisocial.online;

        ssl_certificate /etc/letsencrypt/live/unisocial.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/unisocial.online/privkey.pem;

        # Static files
        location /static/ {
            alias /app/staticfiles/;
        }

        # Media (S3 redirect)
        location /media/ {
            return 301 https://mfp-media-storage.s3.amazonaws.com$uri;
        }

        # Django app
        location / {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # IMPORTANT: now always https
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
